version: '3.8'
services:
  app:
    build: .
    expose:
      - "5000"
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis

  redis:
    image: redis

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
